name: 缺陷报告
description: 记录金融平台接口、UI、数据库或 CI/CD 缺陷
title: "[BUG][模块] 简要描述"
labels: ["bug"]
body:
  - type: dropdown
    id: module
    attributes:
      label: 模块
      options:
        - Findata API
        - Findata UI
        - MySQL
        - GitHub Actions
        - CRM Test Design
        - Other
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: 严重级别
      options:
        - P0-阻塞
        - P1-严重
        - P2-一般
        - P3-轻微
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 分支、提交号、浏览器、数据库、Actions Run 链接等
      placeholder: "branch: main\ncommit: \nworkflow run: "
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: "1. 打开...\n2. 输入...\n3. 点击..."
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 证据
      description: 日志、截图、接口返回、SQL 查询结果
